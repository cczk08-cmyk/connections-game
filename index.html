<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Connections</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'system-ui', '-apple-system', 'sans-serif'] },
          animation: {
            'shake': 'shake 0.5s ease-in-out',
            'bounce-in': 'bounceIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pop': 'pop 0.15s ease-out',
          },
          keyframes: {
            shake: {
              '0%, 100%': { transform: 'translateX(0)' },
              '15%': { transform: 'translateX(-8px)' },
              '30%': { transform: 'translateX(8px)' },
              '45%': { transform: 'translateX(-6px)' },
              '60%': { transform: 'translateX(6px)' },
              '75%': { transform: 'translateX(-3px)' },
              '90%': { transform: 'translateX(3px)' },
            },
            bounceIn: {
              '0%': { transform: 'scale(0.95)' },
              '60%': { transform: 'scale(1.05)' },
              '100%': { transform: 'scale(1)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            pop: {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.08)' },
              '100%': { transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

  <style>
    body { background-color: #1a1a1a; font-family: 'Nunito', system-ui, sans-serif; }
    .tile-animate-in { animation: bounceIn 0.2s ease-out; }
    @keyframes bounceIn {
      0% { transform: scale(0.95); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }
    @keyframes slideUp {
      0% { transform: translateY(24px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .shake { animation: shake 0.5s ease-in-out; }
    .slide-up { animation: slideUp 0.4s ease-out forwards; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .tile { transition: background-color 0.15s, transform 0.15s, box-shadow 0.15s; }
    .tile:active { transform: scale(0.97); }
    @keyframes thumbsFlurry {
      0%   { transform: scale(0) rotate(var(--r)); opacity: 0; }
      28%  { transform: scale(1.25) rotate(calc(var(--r) * -0.5)); opacity: 1; }
      65%  { transform: scale(1.05) rotate(var(--r)); opacity: 1; }
      100% { transform: scale(0.6) translateY(28px) rotate(calc(var(--r) * 1.5)); opacity: 0; }
    }
    .thumbs-flurry-item { animation: thumbsFlurry 1.1s ease-out forwards; }
    @keyframes imagePopIn {
      0%   { transform: scale(0.6) translateY(40px); opacity: 0; }
      55%  { transform: scale(1.06) translateY(-6px); opacity: 1; }
      75%  { transform: scale(0.97) translateY(2px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .image-pop-in { animation: imagePopIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes labelSlideUp {
      0%   { transform: translateY(12px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .label-slide-up { animation: labelSlideUp 0.3s ease-out 0.35s forwards; opacity: 0; }
    @keyframes timerDrain {
      0%   { width: 100%; }
      100% { width: 0%; }
    }
    .timer-drain { animation: timerDrain 3s linear 0.1s forwards; }
    @keyframes sparkleOut {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      80%  { opacity: 0.8; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
    }
    .sparkle {
      position: absolute; top: 50%; left: 50%;
      width: 10px; height: 10px; border-radius: 50%; margin: -5px;
      animation: sparkleOut 0.7s ease-out forwards;
    }
    @keyframes kirbyBounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
    }
    @keyframes loadingFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }
    .kirby-bounce { animation: kirbyBounce 1.4s ease-in-out infinite; }
    .loading-fade-out { animation: loadingFadeOut 0.5s ease-out forwards; }
  </style>
</head>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    puzzle.groups.flatMap(g => g.words.map(w => ({ word: w, groupId: g.id })))
  );
}

// ── EditPanel component ──────────────────────────────────────────────────────
function EditPanel({ puzzle, onSave, onClose }) {
  const [title, setTitle] = useState(puzzle.title);
  const [groups, setGroups] = useState(puzzle.groups.map(g => ({
    ...g,
    words: [...g.words],
    image: g.image || null,
  })));
  const [errors, setErrors] = useState([]);

  function updateGroup(idx, field, value) {
    setGroups(gs => gs.map((g, i) => i === idx ? { ...g, [field]: value } : g));
  }

  function updateWord(gIdx, wIdx, value) {
    setGroups(gs => gs.map((g, i) => {
      if (i !== gIdx) return g;
      const words = [...g.words];
      words[wIdx] = value;
      return { ...g, words };
    }));
  }

  function handleImageUpload(gi, e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 600;
        let { width: w, height: h } = img;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        updateGroup(gi, 'image', canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function validate() {
    const errs = [];
    groups.forEach((g, i) => {
      if (!g.label.trim()) errs.push(`Group ${i + 1}: category label is required.`);
      g.words.forEach((w, j) => {
        if (!w.trim()) errs.push(`Group ${i + 1}, word ${j + 1}: cannot be empty.`);
      });
      const filled = g.words.filter(w => w.trim());
      if (filled.length !== 4) errs.push(`Group ${i + 1}: must have exactly 4 words.`);
    });
    return errs;
  }

  function handleSave() {
    const errs = validate();
    if (errs.length) { setErrors(errs); return; }
    setErrors([]);
    onSave({
      title: title.trim() || 'Connections',
      groups: groups.map(g => ({ ...g, words: g.words.map(w => w.trim().toUpperCase()) })),
    });
  }

  const COLOR_LABELS = { yellow: '🟨 Yellow (Easy)', green: '🟩 Green (Medium)', blue: '🟦 Blue (Hard)', purple: '🟪 Purple (Trickiest)' };

  return (
    <div className="fixed inset-0 flex items-start justify-center z-50 p-4 overflow-y-auto fade-in" style={{ background: 'rgba(0,0,0,0.75)' }}>
      <div className="rounded-2xl shadow-2xl max-w-lg w-full p-6 my-4" style={{ background: '#242424' }}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-xl font-black" style={{ color: '#fff' }}>Edit Puzzle</h2>
          <button onClick={onClose} className="text-2xl leading-none" style={{ color: '#666' }}>×</button>
        </div>

        <div className="mb-5">
          <label className="block text-xs font-black mb-1 uppercase tracking-widest" style={{ color: '#888' }}>Puzzle Title</label>
          <input
            value={title}
            onChange={e => setTitle(e.target.value)}
            placeholder="Connections"
            className="w-full rounded-lg px-3 py-2 text-sm focus:outline-none"
            style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
          />
        </div>

        <div className="space-y-4">
          {groups.map((g, gi) => (
            <div key={g.id} className="rounded-xl p-4" style={{ border: '2px solid #333', background: '#1e1e1e' }}>
              <div className="flex gap-2 mb-3">
                <div className="flex-1">
                  <label className="block text-xs font-black mb-1 uppercase tracking-widest" style={{ color: '#888' }}>Category Label</label>
                  <input
                    value={g.label}
                    onChange={e => updateGroup(gi, 'label', e.target.value)}
                    placeholder="e.g. Types of Fish"
                    className="w-full rounded-lg px-3 py-1.5 text-sm focus:outline-none"
                    style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
                  />
                </div>
                <div>
                  <label className="block text-xs font-black mb-1 uppercase tracking-widest" style={{ color: '#888' }}>Difficulty</label>
                  <select
                    value={g.color}
                    onChange={e => updateGroup(gi, 'color', e.target.value)}
                    className="rounded-lg px-2 py-1.5 text-sm focus:outline-none"
                    style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
                  >
                    {COLOR_ORDER.map(c => (
                      <option key={c} value={c}>{COLOR_LABELS[c]}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-2 mb-3">
                {g.words.map((w, wi) => (
                  <input
                    key={wi}
                    value={w}
                    onChange={e => updateWord(gi, wi, e.target.value)}
                    placeholder={`Word ${wi + 1}`}
                    className="rounded-lg px-3 py-1.5 text-sm focus:outline-none uppercase placeholder:normal-case"
                    style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
                  />
                ))}
              </div>

              {/* Image upload */}
              <div className="pt-3" style={{ borderTop: '1px solid #333' }}>
                <label className="block text-xs font-black mb-2 uppercase tracking-widest" style={{ color: '#888' }}>
                  Correct-guess image <span className="normal-case font-normal" style={{ color: '#555' }}>(optional)</span>
                </label>
                {g.image ? (
                  <div className="flex items-center gap-3">
                    <img src={g.image} alt="preview" className="w-16 h-16 object-cover rounded-lg" style={{ border: '2px solid #444' }} />
                    <div className="flex flex-col gap-1">
                      <label className="cursor-pointer text-xs font-black" style={{ color: '#6aafe6' }}>
                        Replace
                        <input type="file" accept="image/*" className="hidden" onChange={e => handleImageUpload(gi, e)} />
                      </label>
                      <button onClick={() => updateGroup(gi, 'image', null)} className="text-xs font-black text-left" style={{ color: '#e66a6a' }}>
                        Remove
                      </button>
                    </div>
                  </div>
                ) : (
                  <label className="flex items-center gap-2 cursor-pointer w-fit">
                    <div className="rounded-lg px-3 py-2 text-xs flex items-center gap-2" style={{ border: '2px dashed #444', color: '#666' }}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                      </svg>
                      Upload image
                    </div>
                    <input type="file" accept="image/*" className="hidden" onChange={e => handleImageUpload(gi, e)} />
                  </label>
                )}
              </div>
            </div>
          ))}
        </div>

        {errors.length > 0 && (
          <div className="mt-4 p-3 rounded-lg" style={{ background: '#3a1a1a', border: '1px solid #5a2a2a' }}>
            {errors.map((e, i) => (
              <p key={i} className="text-xs" style={{ color: '#e66a6a' }}>{e}</p>
            ))}
          </div>
        )}

        <div className="flex gap-2 mt-5">
          <button
            onClick={onClose}
            className="flex-1 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{ border: '2px solid #555', background: 'transparent', color: '#aaa' }}
          >
            Cancel
          </button>
          <button
            onClick={handleSave}
            className="flex-1 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{ border: '2px solid #fff', background: 'transparent', color: '#fff' }}
          >
            Save & Play
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [puzzle, setPuzzle] = useState(() => {
    try {
      const saved = localStorage.getItem('connections_puzzle');
      return saved ? JSON.parse(saved) : DEFAULT_PUZZLE;
    } catch { return DEFAULT_PUZZLE; }
  });

  const [tiles, setTiles] = useState(() => buildTiles(puzzle));
  const [selected, setSelected] = useState([]);   // tile indices
  const [solvedGroups, setSolvedGroups] = useState([]); // group ids in order solved
  const [mistakes, setMistakes] = useState(0);
  const [shakingTiles, setShakingTiles] = useState([]);
  const [gameOver, setGameOver] = useState(false);
  const [won, setWon] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [newlyRevealedGroup, setNewlyRevealedGroup] = useState(null);
  const [toast, setToast] = useState(null);
  const [showThumbsDown, setShowThumbsDown] = useState(false);
  const [correctImagePopup, setCorrectImagePopup] = useState(null); // { src, label, color }
  const [showLoading, setShowLoading] = useState(true);

  const MAX_MISTAKES = 4;
  const MAX_SELECT = 4;

  const remainingTiles = tiles.filter(t => !solvedGroups.includes(t.groupId));

  function showToast(msg, duration = 1800) {
    setToast(msg);
    setTimeout(() => setToast(null), duration);
  }

  function handleTileClick(globalIdx) {
    if (gameOver) return;
    const tile = tiles[globalIdx];
    if (solvedGroups.includes(tile.groupId)) return;

    setSelected(prev => {
      if (prev.includes(globalIdx)) return prev.filter(i => i !== globalIdx);
      if (prev.length >= MAX_SELECT) return prev;
      return [...prev, globalIdx];
    });
  }

  function handleSubmit() {
    if (selected.length !== MAX_SELECT || gameOver) return;

    const selectedWords = selected.map(i => tiles[i]);
    const groupIds = [...new Set(selectedWords.map(t => t.groupId))];

    if (groupIds.length === 1) {
      // Correct!
      const groupId = groupIds[0];
      const newSolved = [...solvedGroups, groupId];
      const solvedGroup = puzzle.groups.find(g => g.id === groupId);

      setTimeout(() => {
        setSolvedGroups(newSolved);
        setNewlyRevealedGroup(groupId);
        setSelected([]);
        if (solvedGroup?.image) {
          setCorrectImagePopup({ src: solvedGroup.image, label: solvedGroup.label, color: solvedGroup.color });
        }
        if (newSolved.length === puzzle.groups.length) {
          setTimeout(() => { setWon(true); setGameOver(true); }, solvedGroup?.image ? 4200 : 600);
        }
      }, 300);

    } else {
      // Check if one away
      const counts = {};
      selectedWords.forEach(t => { counts[t.groupId] = (counts[t.groupId] || 0) + 1; });
      const maxCount = Math.max(...Object.values(counts));
      if (maxCount === 3) showToast('One away!', 1500);

      // Wrong answer — shake tiles and show thumbs down
      setShakingTiles(selected);
      setShowThumbsDown(true);
      setTimeout(() => setShowThumbsDown(false), 1200);
      setTimeout(() => {
        setShakingTiles([]);
        setSelected([]);
        const newMistakes = mistakes + 1;
        setMistakes(newMistakes);
        if (newMistakes >= MAX_MISTAKES) {
          setGameOver(true);
          setWon(false);
        }
      }, 600);
    }
  }

  function handleShuffle() {
    setTiles(t => shuffle(t));
    setSelected([]);
  }

  function handleDeselectAll() {
    setSelected([]);
  }

  function startNewGame(newPuzzle) {
    setPuzzle(newPuzzle);
    setTiles(buildTiles(newPuzzle));
    setSelected([]);
    setSolvedGroups([]);
    setMistakes(0);
    setShakingTiles([]);
    setGameOver(false);
    setWon(false);
    setNewlyRevealedGroup(null);
    setShowEdit(false);
    setShowThumbsDown(false);
    setCorrectImagePopup(null);
  }

  function handleSaveEdit(newPuzzle) {
    try {
      localStorage.setItem('connections_puzzle', JSON.stringify(newPuzzle));
    } catch (err) {
      showToast('⚠️ Images too large to save — they\'ll reset on refresh', 3500);
    }
    startNewGame(newPuzzle);
  }

  function handlePlayAgain() {
    startNewGame(puzzle);
    setGameOver(false);
    setWon(false);
  }

  // Build ordered solved groups for display
  const solvedGroupsOrdered = COLOR_ORDER
    .map(c => puzzle.groups.find(g => g.color === c))
    .filter(g => g && solvedGroups.includes(g.id));

  // Tiles grid: only show unsolved tiles
  const gridTiles = tiles
    .map((t, i) => ({ ...t, originalIdx: i }))
    .filter(t => !solvedGroups.includes(t.groupId));

  const canSubmit = selected.length === MAX_SELECT && !gameOver;

  if (showLoading) return <LoadingScreen onStart={() => setShowLoading(false)} />;

  return (
    <div className="min-h-screen flex flex-col items-center px-4 py-6" style={{ background: '#1a1a1a' }}>
      {/* Header */}
      <div className="w-full max-w-lg">
        <div className="flex items-center justify-between mb-1">
          <div className="w-9" />
          <h1 className="text-2xl font-black tracking-tight" style={{ color: '#fff' }}>{puzzle.title}</h1>
          <button
            onClick={() => setShowEdit(true)}
            className="w-9 h-9 flex items-center justify-center rounded-full transition-colors"
            style={{ color: '#666' }}
            title="Edit Puzzle"
          >
            <GearIcon />
          </button>
        </div>
        <p className="text-center mb-4" style={{ color: '#999', fontSize: '1rem', fontWeight: 700, letterSpacing: '0.01em' }}>Create four groups of four!</p>

        <hr className="mb-4" style={{ borderColor: '#333' }} />

        {/* Solved category rows */}
        <div className="space-y-2 mb-3">
          {solvedGroupsOrdered.map((g, i) => (
            <CategoryRow key={g.id} group={g} animIndex={i} />
          ))}
        </div>

        {/* Tile grid */}
        {gridTiles.length > 0 && (
          <div className="grid grid-cols-4 gap-2 mb-4">
            {gridTiles.map((t) => (
              <Tile
                key={t.originalIdx}
                word={t.word}
                selected={selected.includes(t.originalIdx)}
                shaking={shakingTiles.includes(t.originalIdx)}
                onClick={() => handleTileClick(t.originalIdx)}
                disabled={gameOver}
              />
            ))}
          </div>
        )}

        {/* Mistake tracker */}
        <div className="flex justify-center mb-4">
          <MistakeTracker mistakes={mistakes} max={MAX_MISTAKES} />
        </div>

        {/* Action buttons */}
        <div className="flex gap-2 justify-center">
          <button
            onClick={handleShuffle}
            disabled={gameOver}
            className="px-5 py-2.5 rounded-full font-black text-sm transition-colors disabled:opacity-30"
            style={{ border: '2px solid #fff', background: 'transparent', color: '#fff' }}
          >
            Shuffle
          </button>
          <button
            onClick={handleDeselectAll}
            disabled={selected.length === 0 || gameOver}
            className="px-5 py-2.5 rounded-full font-black text-sm transition-colors disabled:opacity-30"
            style={{ border: '2px solid #555', background: 'transparent', color: '#aaa' }}
          >
            Deselect All
          </button>
          <button
            onClick={handleSubmit}
            disabled={!canSubmit}
            className="px-5 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{
              border: canSubmit ? '2px solid #fff' : '2px solid #444',
              background: 'transparent',
              color: canSubmit ? '#fff' : '#555',
              cursor: canSubmit ? 'pointer' : 'not-allowed',
            }}
          >
            Submit
          </button>
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div className="fixed top-6 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full font-black text-sm shadow-lg fade-in z-50" style={{ background: '#fff', color: '#1a1a1a' }}>
          {toast}
        </div>
      )}

      {/* Thumbs down on wrong guess */}
      {showThumbsDown && <ThumbsDown />}

      {/* Correct-guess image popup */}
      {correctImagePopup && (
        <ImagePopup
          src={correctImagePopup.src}
          label={correctImagePopup.label}
          color={correctImagePopup.color}
          onClose={() => setCorrectImagePopup(null)}
        />
      )}

      {/* Result Modal */}
      {gameOver && (
        <ResultModal
          won={won}
          puzzle={puzzle}
          solvedGroups={solvedGroups}
          onPlayAgain={handlePlayAgain}
          onEdit={() => { setGameOver(false); setShowEdit(true); }}
        />
      )}

      {/* Edit Panel */}
      {showEdit && (
        <EditPanel
          puzzle={puzzle}
          onSave={handleSaveEdit}
          onClose={() => setShowEdit(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
