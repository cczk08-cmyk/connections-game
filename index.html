<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connections</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'system-ui', '-apple-system', 'sans-serif'] },
          animation: {
            'shake': 'shake 0.5s ease-in-out',
            'bounce-in': 'bounceIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pop': 'pop 0.15s ease-out',
          },
          keyframes: {
            shake: {
              '0%, 100%': { transform: 'translateX(0)' },
              '15%': { transform: 'translateX(-8px)' },
              '30%': { transform: 'translateX(8px)' },
              '45%': { transform: 'translateX(-6px)' },
              '60%': { transform: 'translateX(6px)' },
              '75%': { transform: 'translateX(-3px)' },
              '90%': { transform: 'translateX(3px)' },
            },
            bounceIn: {
              '0%': { transform: 'scale(0.95)' },
              '60%': { transform: 'scale(1.05)' },
              '100%': { transform: 'scale(1)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            pop: {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.08)' },
              '100%': { transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #1a1a1a; font-family: 'Nunito', system-ui, sans-serif; }
    .tile-animate-in { animation: bounceIn 0.2s ease-out; }
    @keyframes bounceIn {
      0% { transform: scale(0.95); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }
    @keyframes slideUp {
      0% { transform: translateY(24px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .shake { animation: shake 0.5s ease-in-out; }
    .slide-up { animation: slideUp 0.4s ease-out forwards; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .tile { transition: background-color 0.15s, transform 0.15s, box-shadow 0.15s; }
    .tile:active { transform: scale(0.97); }
    @keyframes thumbsFlurry {
      0%   { transform: scale(0) rotate(var(--r)); opacity: 0; }
      28%  { transform: scale(1.25) rotate(calc(var(--r) * -0.5)); opacity: 1; }
      65%  { transform: scale(1.05) rotate(var(--r)); opacity: 1; }
      100% { transform: scale(0.6) translateY(28px) rotate(calc(var(--r) * 1.5)); opacity: 0; }
    }
    .thumbs-flurry-item { animation: thumbsFlurry 1.1s ease-out forwards; }
    @keyframes imagePopIn {
      0%   { transform: scale(0.6) translateY(40px); opacity: 0; }
      55%  { transform: scale(1.06) translateY(-6px); opacity: 1; }
      75%  { transform: scale(0.97) translateY(2px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .image-pop-in { animation: imagePopIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes labelSlideUp {
      0%   { transform: translateY(12px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .label-slide-up { animation: labelSlideUp 0.3s ease-out 0.35s forwards; opacity: 0; }
    @keyframes timerDrain {
      0%   { width: 100%; }
      100% { width: 0%; }
    }
    .timer-drain { animation: timerDrain 3s linear 0.1s forwards; }
    @keyframes sparkleOut {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      80%  { opacity: 0.8; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
    }
    .sparkle {
      position: absolute; top: 50%; left: 50%;
      width: 10px; height: 10px; border-radius: 50%; margin: -5px;
      animation: sparkleOut 0.7s ease-out forwards;
    }
    @keyframes kirbyBounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
    }
    @keyframes loadingFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }
    .kirby-bounce { animation: kirbyBounce 1.4s ease-in-out infinite; }
    .loading-fade-out { animation: loadingFadeOut 0.5s ease-out forwards; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ── Default puzzle ──────────────────────────────────────────────────────────
const DEFAULT_PUZZLE = {
  title: "gabbiemimi's connections",
  groups: [
    { id: 0, label: "THINGS YOU'RE BAD AT", color: 'yellow', words: ['MATH', 'COUNT', 'CHINESE', 'BALANCE'] },
    { id: 1, label: 'OUR DAILY VOCABULARY',  color: 'green',  words: ['YAP', 'BIG BACK', 'SMELLY', 'THUMBS DOWN'] },
    { id: 2, label: 'OUR FIRST NIGHT',       color: 'blue',   words: ['LONG ISLAND', 'BUS', 'FAN', '100 PLUS'] },
    { id: 3, label: 'OUR FAV PIC',           color: 'purple', words: ['MIRROR', 'SELFIE', 'GAP', 'TOILET'] },
  ],
};

// ── Color config ────────────────────────────────────────────────────────────
const COLOR_CONFIG = {
  yellow: { hex: '#f9df6d', textHex: '#1a1a1a', label: 'Yellow' },
  green:  { hex: '#a0c35a', textHex: '#1a1a1a', label: 'Green'  },
  blue:   { hex: '#6aafe6', textHex: '#1a1a1a', label: 'Blue'   },
  purple: { hex: '#ba81c5', textHex: '#1a1a1a', label: 'Purple' },
};

const COLOR_ORDER = ['yellow', 'green', 'blue', 'purple'];

// ── Utility ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildTiles(puzzle) {
  return shuffle(
    puzzle.groups.flatMap(g => g.words.map(w => ({ word: w, groupId: g.id })))
  );
}

// ── Kirby SVG ────────────────────────────────────────────────────────────────
function KirbySVG() {
  return (
    <svg viewBox="0 0 260 230" style={{ width: '210px', height: 'auto', overflow: 'visible' }}>
      {/* Stick / pointer rod */}
      <line x1="97" y1="136" x2="57" y2="76" stroke="#9C6B2E" strokeWidth="5" strokeLinecap="round"/>
      {/* Sign shadow */}
      <rect x="12" y="17" width="98" height="68" rx="7" fill="rgba(0,0,0,0.18)"/>
      {/* Sign / whiteboard */}
      <rect x="9" y="13" width="98" height="68" rx="7" fill="#f4f3ef" stroke="#ccc" strokeWidth="2"/>
      {/* Sign text */}
      <text x="58" y="41" textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="900" fontSize="13.5" fill="#1a1a1a">i want</text>
      <text x="58" y="62" textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="900" fontSize="13.5" fill="#1a1a1a">2 play</text>
      {/* Kirby body */}
      <ellipse cx="165" cy="148" rx="76" ry="72" fill="#FF98D0"/>
      {/* Left arm holding stick */}
      <ellipse cx="104" cy="142" rx="31" ry="17" fill="#FF98D0" transform="rotate(-28,104,142)"/>
      {/* Right arm */}
      <ellipse cx="228" cy="157" rx="29" ry="16" fill="#FF98D0" transform="rotate(22,228,157)"/>
      {/* Eyes closed — upside-down arcs */}
      <path d="M145,127 Q153,119 161,127" stroke="#1a1a1a" strokeWidth="3.5" fill="none" strokeLinecap="round"/>
      <path d="M170,127 Q178,119 186,127" stroke="#1a1a1a" strokeWidth="3.5" fill="none" strokeLinecap="round"/>
      {/* Cheeks */}
      <ellipse cx="136" cy="143" rx="15" ry="10" fill="#FF6BAA" opacity="0.65"/>
      <ellipse cx="197" cy="143" rx="15" ry="10" fill="#FF6BAA" opacity="0.65"/>
      {/* Mouth */}
      <path d="M152,153 Q165,166 178,153" stroke="#1a1a1a" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      {/* Left foot */}
      <ellipse cx="138" cy="213" rx="28" ry="14" fill="#FF79BA"/>
      {/* Right foot */}
      <ellipse cx="193" cy="213" rx="28" ry="14" fill="#FF79BA"/>
    </svg>
  );
}

// ── Kirby thumbs-up SVG (win screen) ─────────────────────────────────────────
function KirbyThumbsUpSVG() {
  return (
    <svg viewBox="0 0 220 230" style={{ width: '140px', height: 'auto', overflow: 'visible' }}>
      {/* Left arm (relaxed at side) */}
      <ellipse cx="42" cy="162" rx="27" ry="15" fill="#FF98D0" transform="rotate(18,42,162)"/>
      {/* Body */}
      <ellipse cx="110" cy="155" rx="76" ry="72" fill="#FF98D0"/>
      {/* Right arm raised (thumbs up) */}
      <ellipse cx="175" cy="103" rx="30" ry="16" fill="#FF98D0" transform="rotate(-68,175,103)"/>
      {/* Thumb nub */}
      <ellipse cx="191" cy="60" rx="13" ry="12" fill="#FF79BA"/>
      {/* Eyes — happy closed arcs */}
      <path d="M83,133 Q91,125 99,133" stroke="#1a1a1a" strokeWidth="3.5" fill="none" strokeLinecap="round"/>
      <path d="M118,133 Q126,125 134,133" stroke="#1a1a1a" strokeWidth="3.5" fill="none" strokeLinecap="round"/>
      {/* Cheeks */}
      <ellipse cx="74" cy="148" rx="15" ry="10" fill="#FF6BAA" opacity="0.65"/>
      <ellipse cx="147" cy="148" rx="15" ry="10" fill="#FF6BAA" opacity="0.65"/>
      {/* Open excited mouth */}
      <path d="M92,158 Q110,176 128,158" stroke="#1a1a1a" strokeWidth="2.5" fill="#cc3366" strokeLinecap="round"/>
      <ellipse cx="110" cy="165" rx="10" ry="7" fill="#cc3366"/>
      {/* Feet */}
      <ellipse cx="83" cy="218" rx="28" ry="14" fill="#FF79BA"/>
      <ellipse cx="138" cy="218" rx="28" ry="14" fill="#FF79BA"/>
    </svg>
  );
}

// ── Gear icon (settings button) ───────────────────────────────────────────────
function GearIcon() {
  return (
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  );
}

// ── LoadingScreen ─────────────────────────────────────────────────────────────
function LoadingScreen({ onStart }) {
  const [fading, setFading] = useState(false);

  function handleStart() {
    setFading(true);
    setTimeout(onStart, 450);
  }

  return (
    <div
      className={fading ? 'loading-fade-out' : ''}
      style={{
        position: 'fixed', inset: 0, background: '#1a1a1a',
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        zIndex: 100,
      }}
    >
      <h1 style={{ color: '#fff', fontWeight: 900, fontSize: '1.55rem', textAlign: 'center', lineHeight: 1.25, marginBottom: '24px' }}>
        gabbiemimi's<br/>connections
      </h1>
      <div className="kirby-bounce" style={{ display: 'flex', justifyContent: 'center' }}>
        <KirbySVG />
      </div>
      <button
        onClick={handleStart}
        style={{
          marginTop: '28px',
          background: '#fff', color: '#1a1a1a',
          border: 'none', borderRadius: '50px',
          padding: '14px 72px',
          fontFamily: 'Nunito, sans-serif',
          fontWeight: 900, fontSize: '1.1rem',
          cursor: 'pointer', letterSpacing: '0.02em',
        }}
      >
        Play
      </button>
    </div>
  );
}

// ── ThumbsDown overlay ───────────────────────────────────────────────────────
const FLURRY_ITEMS = [
  { top: '18%', left: '12%',  size: '3.2rem', delay: '0.00s', r: '-18deg' },
  { top: '12%', left: '42%',  size: '4.8rem', delay: '0.04s', r:  '12deg' },
  { top: '22%', left: '72%',  size: '3.4rem', delay: '0.09s', r:  '-8deg' },
  { top: '42%', left: '85%',  size: '4.2rem', delay: '0.02s', r:  '20deg' },
  { top: '48%', left: '48%',  size: '5.4rem', delay: '0.06s', r: '-12deg' },
  { top: '52%', left: '18%',  size: '3.8rem', delay: '0.11s', r:   '8deg' },
  { top: '38%', left: '3%',   size: '3.0rem', delay: '0.14s', r: '-22deg' },
  { top: '20%', left: '88%',  size: '3.4rem', delay: '0.07s', r:  '16deg' },
  { top: '65%', left: '68%',  size: '3.0rem', delay: '0.18s', r:  '-6deg' },
  { top: '10%', left: '58%',  size: '4.2rem', delay: '0.03s', r:  '10deg' },
  { top: '60%', left: '35%',  size: '3.6rem', delay: '0.13s', r: '-14deg' },
  { top: '70%', left: '8%',   size: '3.2rem', delay: '0.16s', r:  '18deg' },
];

function ThumbsDown() {
  return (
    <div className="fixed inset-0 z-40 pointer-events-none overflow-hidden">
      {FLURRY_ITEMS.map((item, i) => (
        <span
          key={i}
          className="thumbs-flurry-item"
          style={{
            position: 'absolute',
            top: item.top, left: item.left,
            fontSize: item.size,
            lineHeight: 1,
            animationDelay: item.delay,
            '--r': item.r,
            filter: 'drop-shadow(0 3px 8px rgba(0,0,0,0.35))',
          }}
        >
          👎🏼
        </span>
      ))}
    </div>
  );
}

// ── ImagePopup ───────────────────────────────────────────────────────────────
const SPARKLE_DIRS = [
  { tx: '80px',  ty: '0px'   },
  { tx: '56px',  ty: '-56px' },
  { tx: '0px',   ty: '-80px' },
  { tx: '-56px', ty: '-56px' },
  { tx: '-80px', ty: '0px'   },
  { tx: '-56px', ty: '56px'  },
  { tx: '0px',   ty: '80px'  },
  { tx: '56px',  ty: '56px'  },
];
const SPARKLE_COLORS = ['#fff', '#f9df6d', '#fff', '#ba81c5', '#fff', '#6aafe6', '#f9df6d', '#fff'];

function ImagePopup({ src, label, color, onClose }) {
  const cfg = COLOR_CONFIG[color] || {};
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, []);
  return (
    <div
      className="fixed inset-0 flex items-center justify-center z-50 p-6 fade-in cursor-pointer"
      style={{ background: 'rgba(0,0,0,0.82)' }}
      onClick={onClose}
    >
      <div className="image-pop-in max-w-sm w-full" onClick={e => e.stopPropagation()}>
        {/* Image with sparkles + timer bar */}
        <div style={{ position: 'relative' }}>
          <img
            src={src}
            alt={label}
            className="w-full rounded-2xl shadow-2xl object-contain"
            style={{ maxHeight: '60vh', display: 'block' }}
          />
          {/* Sparkles shoot from center of image */}
          {SPARKLE_DIRS.map((dir, i) => (
            <div
              key={i}
              className="sparkle"
              style={{
                '--tx': dir.tx, '--ty': dir.ty,
                background: SPARKLE_COLORS[i],
                animationDelay: `${i * 30}ms`,
                width: i % 2 === 0 ? '10px' : '7px',
                height: i % 2 === 0 ? '10px' : '7px',
                boxShadow: `0 0 6px 2px ${SPARKLE_COLORS[i]}`,
              }}
            />
          ))}
          {/* Timer drain bar along the bottom edge */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            height: '5px', background: 'rgba(255,255,255,0.15)',
            borderRadius: '0 0 16px 16px', overflow: 'hidden',
          }}>
            <div
              className="timer-drain"
              style={{ height: '100%', background: cfg.hex, borderRadius: '0 0 16px 16px' }}
            />
          </div>
        </div>
        {/* Category label */}
        <div
          className="label-slide-up mt-3 rounded-xl px-4 py-2 text-center font-black text-sm"
          style={{ background: cfg.hex, color: cfg.textHex }}
        >
          {label}
        </div>
        <p className="text-center text-xs mt-2" style={{ color: 'rgba(255,255,255,0.4)' }}>Tap to dismiss</p>
      </div>
    </div>
  );
}

// ── Tile component ───────────────────────────────────────────────────────────
function Tile({ word, selected, shaking, onClick, disabled }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`
        tile w-full aspect-square rounded-2xl font-extrabold uppercase tracking-wide
        flex items-center justify-center text-center leading-tight px-2 cursor-pointer
        select-none border-none
        ${shaking ? 'shake' : ''}
        ${disabled ? 'opacity-50 cursor-not-allowed' : ''}
        focus:outline-none
      `}
      style={{
        fontSize: word.length > 10 ? '0.65rem' : word.length > 7 ? '0.75rem' : '0.85rem',
        background: selected ? '#5a5a5a' : '#c8c4b4',
        color: selected ? '#ffffff' : '#1a1a1a',
        boxShadow: selected ? 'inset 0 0 0 2.5px rgba(255,255,255,0.35)' : '0 2px 4px rgba(0,0,0,0.3)',
      }}
    >
      {word}
    </button>
  );
}

// ── CategoryRow component ────────────────────────────────────────────────────
function CategoryRow({ group, animIndex }) {
  const cfg = COLOR_CONFIG[group.color];
  return (
    <div
      className="rounded-2xl px-4 py-3 slide-up"
      style={{ background: cfg.hex, color: cfg.textHex, animationDelay: `${animIndex * 80}ms`, opacity: 0, animationFillMode: 'forwards' }}
    >
      <div className="font-black uppercase text-xs tracking-widest opacity-70 mb-0.5">{group.label}</div>
      <div className="font-bold text-sm">{group.words.join(', ')}</div>
    </div>
  );
}

// ── MistakeTracker component ─────────────────────────────────────────────────
function MistakeTracker({ mistakes, max = 4 }) {
  return (
    <div className="flex items-center gap-2.5">
      <span className="text-sm font-bold" style={{ color: '#999' }}>Mistakes Remaining:</span>
      <div className="flex gap-2">
        {Array.from({ length: max }).map((_, i) => (
          <div
            key={i}
            className="w-3.5 h-3.5 rounded-full transition-all duration-300"
            style={{
              background: i < max - mistakes ? '#d4d0c4' : 'transparent',
              border: i < max - mistakes ? 'none' : '2px solid #555',
            }}
          />
        ))}
      </div>
    </div>
  );
}

// ── ResultModal component ────────────────────────────────────────────────────
function ResultModal({ won, puzzle, solvedGroups, onPlayAgain, onEdit }) {
  const orderedSolved = COLOR_ORDER.map(c => puzzle.groups.find(g => g.color === c)).filter(Boolean);
  return (
    <div className="fixed inset-0 flex items-center justify-center z-50 p-4 fade-in" style={{ background: 'rgba(0,0,0,0.75)' }}>
      <div className="rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center" style={{ background: '#242424' }}>
        <div className="flex justify-center mb-1">
          {won ? <KirbyThumbsUpSVG /> : <span style={{ fontSize: '3.5rem', lineHeight: 1, display: 'block', marginBottom: '4px' }}>😔</span>}
        </div>
        <h2 className="text-2xl font-black mb-1" style={{ color: '#fff' }}>{won ? 'Brilliant!' : 'Better luck next time'}</h2>
        <p className="text-sm mb-5" style={{ color: '#888' }}>
          {won ? 'You found all the connections!' : 'You used all your guesses.'}
        </p>
        <div className="space-y-2 mb-6 text-left">
          {orderedSolved.map((g) => {
            const cfg = COLOR_CONFIG[g.color];
            return (
              <div key={g.id} className="rounded-xl p-2.5" style={{ background: cfg.hex, color: cfg.textHex }}>
                <div className="font-black text-xs uppercase tracking-widest opacity-70">{g.label}</div>
                <div className="text-sm font-bold">{g.words.join(', ')}</div>
              </div>
            );
          })}
        </div>
        <div className="flex gap-2">
          <button
            onClick={onEdit}
            className="flex-1 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{ border: '2px solid #555', background: 'transparent', color: '#ccc' }}
          >
            Edit Puzzle
          </button>
          <button
            onClick={onPlayAgain}
            className="flex-1 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{ border: '2px solid #fff', background: 'transparent', color: '#fff' }}
          >
            Play Again
          </button>
        </div>
      </div>
    </div>
  );
}

// ── EditPanel component ──────────────────────────────────────────────────────
function EditPanel({ puzzle, onSave, onClose }) {
  const [title, setTitle] = useState(puzzle.title);
  const [groups, setGroups] = useState(puzzle.groups.map(g => ({
    ...g,
    words: [...g.words],
    image: g.image || null,
  })));
  const [errors, setErrors] = useState([]);

  function updateGroup(idx, field, value) {
    setGroups(gs => gs.map((g, i) => i === idx ? { ...g, [field]: value } : g));
  }

  function updateWord(gIdx, wIdx, value) {
    setGroups(gs => gs.map((g, i) => {
      if (i !== gIdx) return g;
      const words = [...g.words];
      words[wIdx] = value;
      return { ...g, words };
    }));
  }

  function handleImageUpload(gi, e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => updateGroup(gi, 'image', ev.target.result);
    reader.readAsDataURL(file);
  }

  function validate() {
    const errs = [];
    groups.forEach((g, i) => {
      if (!g.label.trim()) errs.push(`Group ${i + 1}: category label is required.`);
      g.words.forEach((w, j) => {
        if (!w.trim()) errs.push(`Group ${i + 1}, word ${j + 1}: cannot be empty.`);
      });
      const filled = g.words.filter(w => w.trim());
      if (filled.length !== 4) errs.push(`Group ${i + 1}: must have exactly 4 words.`);
    });
    return errs;
  }

  function handleSave() {
    const errs = validate();
    if (errs.length) { setErrors(errs); return; }
    setErrors([]);
    onSave({
      title: title.trim() || 'Connections',
      groups: groups.map(g => ({ ...g, words: g.words.map(w => w.trim().toUpperCase()) })),
    });
  }

  const COLOR_LABELS = { yellow: '🟨 Yellow (Easy)', green: '🟩 Green (Medium)', blue: '🟦 Blue (Hard)', purple: '🟪 Purple (Trickiest)' };

  return (
    <div className="fixed inset-0 flex items-start justify-center z-50 p-4 overflow-y-auto fade-in" style={{ background: 'rgba(0,0,0,0.75)' }}>
      <div className="rounded-2xl shadow-2xl max-w-lg w-full p-6 my-4" style={{ background: '#242424' }}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-xl font-black" style={{ color: '#fff' }}>Edit Puzzle</h2>
          <button onClick={onClose} className="text-2xl leading-none" style={{ color: '#666' }}>×</button>
        </div>

        <div className="mb-5">
          <label className="block text-xs font-black mb-1 uppercase tracking-widest" style={{ color: '#888' }}>Puzzle Title</label>
          <input
            value={title}
            onChange={e => setTitle(e.target.value)}
            placeholder="Connections"
            className="w-full rounded-lg px-3 py-2 text-sm focus:outline-none"
            style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
          />
        </div>

        <div className="space-y-4">
          {groups.map((g, gi) => (
            <div key={g.id} className="rounded-xl p-4" style={{ border: '2px solid #333', background: '#1e1e1e' }}>
              <div className="flex gap-2 mb-3">
                <div className="flex-1">
                  <label className="block text-xs font-black mb-1 uppercase tracking-widest" style={{ color: '#888' }}>Category Label</label>
                  <input
                    value={g.label}
                    onChange={e => updateGroup(gi, 'label', e.target.value)}
                    placeholder="e.g. Types of Fish"
                    className="w-full rounded-lg px-3 py-1.5 text-sm focus:outline-none"
                    style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
                  />
                </div>
                <div>
                  <label className="block text-xs font-black mb-1 uppercase tracking-widest" style={{ color: '#888' }}>Difficulty</label>
                  <select
                    value={g.color}
                    onChange={e => updateGroup(gi, 'color', e.target.value)}
                    className="rounded-lg px-2 py-1.5 text-sm focus:outline-none"
                    style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
                  >
                    {COLOR_ORDER.map(c => (
                      <option key={c} value={c}>{COLOR_LABELS[c]}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-2 mb-3">
                {g.words.map((w, wi) => (
                  <input
                    key={wi}
                    value={w}
                    onChange={e => updateWord(gi, wi, e.target.value)}
                    placeholder={`Word ${wi + 1}`}
                    className="rounded-lg px-3 py-1.5 text-sm focus:outline-none uppercase placeholder:normal-case"
                    style={{ background: '#333', border: '2px solid #444', color: '#fff' }}
                  />
                ))}
              </div>

              {/* Image upload */}
              <div className="pt-3" style={{ borderTop: '1px solid #333' }}>
                <label className="block text-xs font-black mb-2 uppercase tracking-widest" style={{ color: '#888' }}>
                  Correct-guess image <span className="normal-case font-normal" style={{ color: '#555' }}>(optional)</span>
                </label>
                {g.image ? (
                  <div className="flex items-center gap-3">
                    <img src={g.image} alt="preview" className="w-16 h-16 object-cover rounded-lg" style={{ border: '2px solid #444' }} />
                    <div className="flex flex-col gap-1">
                      <label className="cursor-pointer text-xs font-black" style={{ color: '#6aafe6' }}>
                        Replace
                        <input type="file" accept="image/*" className="hidden" onChange={e => handleImageUpload(gi, e)} />
                      </label>
                      <button onClick={() => updateGroup(gi, 'image', null)} className="text-xs font-black text-left" style={{ color: '#e66a6a' }}>
                        Remove
                      </button>
                    </div>
                  </div>
                ) : (
                  <label className="flex items-center gap-2 cursor-pointer w-fit">
                    <div className="rounded-lg px-3 py-2 text-xs flex items-center gap-2" style={{ border: '2px dashed #444', color: '#666' }}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                      </svg>
                      Upload image
                    </div>
                    <input type="file" accept="image/*" className="hidden" onChange={e => handleImageUpload(gi, e)} />
                  </label>
                )}
              </div>
            </div>
          ))}
        </div>

        {errors.length > 0 && (
          <div className="mt-4 p-3 rounded-lg" style={{ background: '#3a1a1a', border: '1px solid #5a2a2a' }}>
            {errors.map((e, i) => (
              <p key={i} className="text-xs" style={{ color: '#e66a6a' }}>{e}</p>
            ))}
          </div>
        )}

        <div className="flex gap-2 mt-5">
          <button
            onClick={onClose}
            className="flex-1 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{ border: '2px solid #555', background: 'transparent', color: '#aaa' }}
          >
            Cancel
          </button>
          <button
            onClick={handleSave}
            className="flex-1 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{ border: '2px solid #fff', background: 'transparent', color: '#fff' }}
          >
            Save & Play
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [puzzle, setPuzzle] = useState(() => {
    try {
      const saved = localStorage.getItem('connections_puzzle');
      return saved ? JSON.parse(saved) : DEFAULT_PUZZLE;
    } catch { return DEFAULT_PUZZLE; }
  });

  const [tiles, setTiles] = useState(() => buildTiles(puzzle));
  const [selected, setSelected] = useState([]);   // tile indices
  const [solvedGroups, setSolvedGroups] = useState([]); // group ids in order solved
  const [mistakes, setMistakes] = useState(0);
  const [shakingTiles, setShakingTiles] = useState([]);
  const [gameOver, setGameOver] = useState(false);
  const [won, setWon] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [newlyRevealedGroup, setNewlyRevealedGroup] = useState(null);
  const [toast, setToast] = useState(null);
  const [showThumbsDown, setShowThumbsDown] = useState(false);
  const [correctImagePopup, setCorrectImagePopup] = useState(null); // { src, label, color }
  const [showLoading, setShowLoading] = useState(true);

  const MAX_MISTAKES = 4;
  const MAX_SELECT = 4;

  const remainingTiles = tiles.filter(t => !solvedGroups.includes(t.groupId));

  function showToast(msg, duration = 1800) {
    setToast(msg);
    setTimeout(() => setToast(null), duration);
  }

  function handleTileClick(globalIdx) {
    if (gameOver) return;
    const tile = tiles[globalIdx];
    if (solvedGroups.includes(tile.groupId)) return;

    setSelected(prev => {
      if (prev.includes(globalIdx)) return prev.filter(i => i !== globalIdx);
      if (prev.length >= MAX_SELECT) return prev;
      return [...prev, globalIdx];
    });
  }

  function handleSubmit() {
    if (selected.length !== MAX_SELECT || gameOver) return;

    const selectedWords = selected.map(i => tiles[i]);
    const groupIds = [...new Set(selectedWords.map(t => t.groupId))];

    if (groupIds.length === 1) {
      // Correct!
      const groupId = groupIds[0];
      const newSolved = [...solvedGroups, groupId];
      const solvedGroup = puzzle.groups.find(g => g.id === groupId);

      setTimeout(() => {
        setSolvedGroups(newSolved);
        setNewlyRevealedGroup(groupId);
        setSelected([]);
        if (solvedGroup?.image) {
          setCorrectImagePopup({ src: solvedGroup.image, label: solvedGroup.label, color: solvedGroup.color });
        }
        if (newSolved.length === puzzle.groups.length) {
          setTimeout(() => { setWon(true); setGameOver(true); }, solvedGroup?.image ? 4200 : 600);
        }
      }, 300);

    } else {
      // Check if one away
      const counts = {};
      selectedWords.forEach(t => { counts[t.groupId] = (counts[t.groupId] || 0) + 1; });
      const maxCount = Math.max(...Object.values(counts));
      if (maxCount === 3) showToast('One away!', 1500);

      // Wrong answer — shake tiles and show thumbs down
      setShakingTiles(selected);
      setShowThumbsDown(true);
      setTimeout(() => setShowThumbsDown(false), 1200);
      setTimeout(() => {
        setShakingTiles([]);
        setSelected([]);
        const newMistakes = mistakes + 1;
        setMistakes(newMistakes);
        if (newMistakes >= MAX_MISTAKES) {
          setGameOver(true);
          setWon(false);
        }
      }, 600);
    }
  }

  function handleShuffle() {
    setTiles(t => shuffle(t));
    setSelected([]);
  }

  function handleDeselectAll() {
    setSelected([]);
  }

  function startNewGame(newPuzzle) {
    setPuzzle(newPuzzle);
    setTiles(buildTiles(newPuzzle));
    setSelected([]);
    setSolvedGroups([]);
    setMistakes(0);
    setShakingTiles([]);
    setGameOver(false);
    setWon(false);
    setNewlyRevealedGroup(null);
    setShowEdit(false);
    setShowThumbsDown(false);
    setCorrectImagePopup(null);
  }

  function handleSaveEdit(newPuzzle) {
    try { localStorage.setItem('connections_puzzle', JSON.stringify(newPuzzle)); } catch {}
    startNewGame(newPuzzle);
  }

  function handlePlayAgain() {
    startNewGame(puzzle);
    setGameOver(false);
    setWon(false);
  }

  // Build ordered solved groups for display
  const solvedGroupsOrdered = COLOR_ORDER
    .map(c => puzzle.groups.find(g => g.color === c))
    .filter(g => g && solvedGroups.includes(g.id));

  // Tiles grid: only show unsolved tiles
  const gridTiles = tiles
    .map((t, i) => ({ ...t, originalIdx: i }))
    .filter(t => !solvedGroups.includes(t.groupId));

  const canSubmit = selected.length === MAX_SELECT && !gameOver;

  if (showLoading) return <LoadingScreen onStart={() => setShowLoading(false)} />;

  return (
    <div className="min-h-screen flex flex-col items-center px-4 py-6" style={{ background: '#1a1a1a' }}>
      {/* Header */}
      <div className="w-full max-w-lg">
        <div className="flex items-center justify-between mb-1">
          <div className="w-9" />
          <h1 className="text-2xl font-black tracking-tight" style={{ color: '#fff' }}>{puzzle.title}</h1>
          <button
            onClick={() => setShowEdit(true)}
            className="w-9 h-9 flex items-center justify-center rounded-full transition-colors"
            style={{ color: '#666' }}
            title="Edit Puzzle"
          >
            <GearIcon />
          </button>
        </div>
        <p className="text-center mb-4" style={{ color: '#999', fontSize: '1rem', fontWeight: 700, letterSpacing: '0.01em' }}>Create four groups of four!</p>

        <hr className="mb-4" style={{ borderColor: '#333' }} />

        {/* Solved category rows */}
        <div className="space-y-2 mb-3">
          {solvedGroupsOrdered.map((g, i) => (
            <CategoryRow key={g.id} group={g} animIndex={i} />
          ))}
        </div>

        {/* Tile grid */}
        {gridTiles.length > 0 && (
          <div className="grid grid-cols-4 gap-2 mb-4">
            {gridTiles.map((t) => (
              <Tile
                key={t.originalIdx}
                word={t.word}
                selected={selected.includes(t.originalIdx)}
                shaking={shakingTiles.includes(t.originalIdx)}
                onClick={() => handleTileClick(t.originalIdx)}
                disabled={gameOver}
              />
            ))}
          </div>
        )}

        {/* Mistake tracker */}
        <div className="flex justify-center mb-4">
          <MistakeTracker mistakes={mistakes} max={MAX_MISTAKES} />
        </div>

        {/* Action buttons */}
        <div className="flex gap-2 justify-center">
          <button
            onClick={handleShuffle}
            disabled={gameOver}
            className="px-5 py-2.5 rounded-full font-black text-sm transition-colors disabled:opacity-30"
            style={{ border: '2px solid #fff', background: 'transparent', color: '#fff' }}
          >
            Shuffle
          </button>
          <button
            onClick={handleDeselectAll}
            disabled={selected.length === 0 || gameOver}
            className="px-5 py-2.5 rounded-full font-black text-sm transition-colors disabled:opacity-30"
            style={{ border: '2px solid #555', background: 'transparent', color: '#aaa' }}
          >
            Deselect All
          </button>
          <button
            onClick={handleSubmit}
            disabled={!canSubmit}
            className="px-5 py-2.5 rounded-full font-black text-sm transition-colors"
            style={{
              border: canSubmit ? '2px solid #fff' : '2px solid #444',
              background: 'transparent',
              color: canSubmit ? '#fff' : '#555',
              cursor: canSubmit ? 'pointer' : 'not-allowed',
            }}
          >
            Submit
          </button>
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div className="fixed top-6 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full font-black text-sm shadow-lg fade-in z-50" style={{ background: '#fff', color: '#1a1a1a' }}>
          {toast}
        </div>
      )}

      {/* Thumbs down on wrong guess */}
      {showThumbsDown && <ThumbsDown />}

      {/* Correct-guess image popup */}
      {correctImagePopup && (
        <ImagePopup
          src={correctImagePopup.src}
          label={correctImagePopup.label}
          color={correctImagePopup.color}
          onClose={() => setCorrectImagePopup(null)}
        />
      )}

      {/* Result Modal */}
      {gameOver && (
        <ResultModal
          won={won}
          puzzle={puzzle}
          solvedGroups={solvedGroups}
          onPlayAgain={handlePlayAgain}
          onEdit={() => { setGameOver(false); setShowEdit(true); }}
        />
      )}

      {/* Edit Panel */}
      {showEdit && (
        <EditPanel
          puzzle={puzzle}
          onSave={handleSaveEdit}
          onClose={() => setShowEdit(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
